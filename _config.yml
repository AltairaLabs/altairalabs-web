# Site settings
title: AltairaLabs
description: AltairaLabs Website
baseurl: "" # the subpath of your site, e.g. /blog
url: "https://www.altairalabs.ai" # the base hostname & protocol for your site

# Build settings
markdown: kramdown
theme: minima

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
