<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 780" font-family="Inter, system-ui, -apple-system, sans-serif" role="img" aria-labelledby="title">
  <title id="title">The full pipeline of a production diffusion model. The text prompt flows through one or more large text encoders to produce a summary vector. The random seed initialises a block of pure noise the same shape as the final output. The denoising loop runs N times — each step consisting of two forward passes of the denoising network (Classifier-Free Guidance, one with the prompt and one without), an extrapolation between them, and a subtraction that makes the block slightly cleaner. After N iterations, the clean latent is decoded through a VAE into the final image.</title>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#475569"/>
    </marker>
    <marker id="arrow-cyan" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#06B6D4"/>
    </marker>
    <marker id="arrow-violet" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#8B5CF6"/>
    </marker>
    <style>
      .title { font-size: 13px; font-weight: 600; }
      .mono { font-family: "JetBrains Mono", ui-monospace, Menlo, monospace; font-size: 10.5px; font-weight: 600; }
      .label { font-size: 12px; font-weight: 600; }
      .sub { font-size: 10.5px; }
      .caption { font-size: 11.5px; fill: #475569; }
    </style>
  </defs>

  <!-- Heading -->
  <text x="460" y="26" font-size="15" font-weight="700" fill="#0F172A" text-anchor="middle">What really runs when you generate an image</text>

  <!-- Row 1: Raw inputs -->
  <rect x="30" y="56" width="230" height="48" rx="8" fill="#F8FAFC" stroke="#F59E0B" stroke-width="2"/>
  <text x="145" y="78" class="label" fill="#0F172A" text-anchor="middle">Random seed</text>
  <text x="145" y="94" class="sub" fill="#64748B" text-anchor="middle">initialises the noise</text>

  <rect x="660" y="56" width="230" height="48" rx="8" fill="#F8FAFC" stroke="#2563EB" stroke-width="2"/>
  <text x="775" y="78" class="label" fill="#0F172A" text-anchor="middle">Text prompt</text>
  <text x="775" y="94" class="sub" fill="#64748B" text-anchor="middle">"a corgi on Mars..."</text>

  <line x1="145" y1="104" x2="145" y2="130" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="775" y1="104" x2="775" y2="130" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Row 2: Pre-processing -->
  <rect x="30" y="132" width="230" height="86" rx="8" fill="#0F172A" stroke="#F59E0B" stroke-width="2"/>
  <text x="145" y="154" class="title" fill="#F59E0B" text-anchor="middle">Initial noise block</text>
  <text x="145" y="174" class="mono" fill="#E2E8F0" text-anchor="middle">pure random numbers</text>
  <text x="145" y="190" class="mono" fill="#94A3B8" text-anchor="middle">same shape as output</text>
  <text x="145" y="206" class="mono" fill="#94A3B8" text-anchor="middle">("the latent")</text>

  <rect x="660" y="132" width="230" height="86" rx="8" fill="#0F172A" stroke="#2563EB" stroke-width="2"/>
  <text x="775" y="154" class="title" fill="#2563EB" text-anchor="middle">Text encoder(s)</text>
  <text x="775" y="174" class="mono" fill="#E2E8F0" text-anchor="middle">T5 XXL + CLIP</text>
  <text x="775" y="190" class="mono" fill="#94A3B8" text-anchor="middle">(SD3 stacks three of them)</text>
  <text x="775" y="206" class="mono" fill="#94A3B8" text-anchor="middle">11B+ parameters</text>

  <!-- Arrow from text encoders down to summary vector -->
  <line x1="775" y1="218" x2="775" y2="244" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Row 3: Summary vector -->
  <rect x="660" y="246" width="230" height="36" rx="8" fill="#ECFEFF" stroke="#06B6D4" stroke-width="2"/>
  <text x="775" y="270" class="title" fill="#06B6D4" text-anchor="middle">Summary vector (conditioning)</text>

  <!-- Arrow: initial noise straight down into loop -->
  <line x1="145" y1="218" x2="145" y2="384" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Conditioning arrow: summary vector down-left into the CFG area of the loop -->
  <path d="M 775 282 L 775 308 L 360 308 L 360 388" stroke="#06B6D4" stroke-width="2" stroke-dasharray="5,4" fill="none" marker-end="url(#arrow-cyan)"/>
  <text x="567" y="302" class="sub" fill="#06B6D4" text-anchor="middle" font-style="italic">re-used as conditioning at every step</text>

  <!-- Row 4: Denoising loop outer box -->
  <rect x="20" y="330" width="880" height="280" rx="14" fill="#FAF5FF" stroke="#8B5CF6" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="460" y="355" class="title" fill="#8B5CF6" text-anchor="middle">Denoising loop — repeats N times (N = 1 to 50)</text>

  <!-- Current block -->
  <rect x="50" y="390" width="160" height="100" rx="8" fill="white" stroke="#8B5CF6" stroke-width="2"/>
  <text x="130" y="420" class="label" fill="#0F172A" text-anchor="middle">Current block</text>
  <text x="130" y="440" class="mono" fill="#64748B" text-anchor="middle">(the noisy latent</text>
  <text x="130" y="456" class="mono" fill="#64748B" text-anchor="middle">at this step)</text>

  <!-- Arrows from current block to CFG passes -->
  <line x1="210" y1="418" x2="238" y2="416" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="210" y1="462" x2="238" y2="466" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- CFG Pass 1 -->
  <rect x="240" y="395" width="250" height="42" rx="6" fill="#0F172A" stroke="#06B6D4" stroke-width="1.5"/>
  <text x="365" y="412" class="mono" fill="#06B6D4" text-anchor="middle">Pass 1: network(block, prompt)</text>
  <text x="365" y="428" class="mono" fill="#94A3B8" text-anchor="middle">"guided"</text>

  <!-- CFG Pass 2 -->
  <rect x="240" y="445" width="250" height="42" rx="6" fill="#0F172A" stroke="#06B6D4" stroke-width="1.5"/>
  <text x="365" y="462" class="mono" fill="#06B6D4" text-anchor="middle">Pass 2: network(block, no prompt)</text>
  <text x="365" y="478" class="mono" fill="#94A3B8" text-anchor="middle">"unguided"</text>

  <!-- CFG label -->
  <text x="365" y="508" class="sub" fill="#8B5CF6" text-anchor="middle" font-weight="600">Classifier-Free Guidance: 2 forward passes per step</text>

  <!-- Arrows from both passes converging to extrapolate -->
  <line x1="490" y1="416" x2="528" y2="434" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="490" y1="466" x2="528" y2="448" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Extrapolate -->
  <rect x="530" y="395" width="115" height="95" rx="8" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="2"/>
  <text x="587" y="423" class="label" fill="#8B5CF6" text-anchor="middle">Extrapolate</text>
  <text x="587" y="443" class="sub" fill="#475569" text-anchor="middle">guided noise</text>
  <text x="587" y="459" class="sub" fill="#475569" text-anchor="middle">prediction</text>

  <!-- Arrow to subtract -->
  <line x1="645" y1="440" x2="678" y2="440" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Subtract / Cleaner block -->
  <rect x="680" y="390" width="200" height="100" rx="8" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="2"/>
  <text x="780" y="418" class="label" fill="#0F172A" text-anchor="middle">Subtract →</text>
  <text x="780" y="436" class="label" fill="#0F172A" text-anchor="middle">slightly cleaner block</text>
  <text x="780" y="462" class="mono" fill="#64748B" text-anchor="middle">(same size, less noise)</text>

  <!-- Loop-back arrow (curved, inside loop) -->
  <path d="M 780 490 C 780 550, 130 550, 130 490" stroke="#8B5CF6" stroke-width="2" fill="none" marker-end="url(#arrow-violet)"/>
  <text x="455" y="572" class="sub" fill="#8B5CF6" text-anchor="middle" font-style="italic">feed the cleaner block back in, repeat</text>

  <!-- Exit arrow from loop -->
  <path d="M 880 440 L 905 440 L 905 632 L 210 632 L 210 648" stroke="#475569" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="702" y="626" class="sub" fill="#475569" font-style="italic">after N iterations</text>

  <!-- Row 5: Output pipeline -->
  <rect x="100" y="650" width="220" height="60" rx="8" fill="#ECFDF5" stroke="#10B981" stroke-width="2"/>
  <text x="210" y="674" class="label" fill="#10B981" text-anchor="middle">Clean latent</text>
  <text x="210" y="692" class="mono" fill="#475569" text-anchor="middle">(all the noise is gone)</text>

  <line x1="320" y1="680" x2="360" y2="680" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="360" y="650" width="200" height="60" rx="8" fill="#0F172A" stroke="#10B981" stroke-width="2"/>
  <text x="460" y="674" class="label" fill="#10B981" text-anchor="middle">VAE decoder</text>
  <text x="460" y="692" class="mono" fill="#94A3B8" text-anchor="middle">latent → pixels</text>

  <line x1="560" y1="680" x2="600" y2="680" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="600" y="650" width="220" height="60" rx="8" fill="#ECFDF5" stroke="#10B981" stroke-width="2"/>
  <text x="710" y="674" class="label" fill="#10B981" text-anchor="middle">Output image</text>
  <text x="710" y="692" class="mono" fill="#475569" text-anchor="middle">the thing the API returns</text>

  <!-- Caption -->
  <text x="460" y="744" class="caption" text-anchor="middle" font-style="italic">"Twenty-five denoising steps" is really fifty forward passes of the denoising network,</text>
  <text x="460" y="760" class="caption" text-anchor="middle" font-style="italic">after one or more separate text encoder passes, before a final VAE decode.</text>
</svg>
