<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" font-family="Inter, system-ui, -apple-system, sans-serif" role="img" aria-labelledby="title">
  <title id="title">The Omnia facade auth chain. An inbound request reaches the facade carrying either a Bearer token or upstream-injected trusted headers. A single Chain of Validators runs in order: sharedToken (constant-time Bearer compare against a Secret), apiKeys (per-caller API key hashes loaded from labelled Secrets with 30 second refresh), OIDC (RS256 JWT verified against a per-agent JWKS mirror Secret that the controller auto-fetches every six hours), edgeTrust (trusts x-user-id / x-user-roles / x-user-email headers emitted by the chart's Istio RequestAuthentication after an EnvoyFilter has stripped any attacker-supplied copies), and finally the management-plane validator (the dashboard's debug path). Each validator returns ErrNoCredential to fall through, returns an AuthenticatedIdentity to short-circuit admit, or returns any other error to short-circuit reject. If every validator returns ErrNoCredential and the chain is non-empty, the request gets 401 — this is the default flip that closes C-3. On admit, the identity carries Subject, Role, EndUser, Origin and Claims into policy.WithIdentity for downstream ToolPolicy CEL to gate tool calls against the verified caller. The same chain wraps both the WebSocket upgrade handler and the A2A HTTP handler.</title>
  <defs>
    <style>
      .hdr { font-size: 15px; font-weight: 700; fill: #0F172A; }
      .col-hdr { font-size: 13px; font-weight: 700; }
      .label { font-size: 11.5px; font-weight: 600; fill: #0F172A; }
      .caption { font-size: 11px; fill: #475569; }
      .mono { font-family: "JetBrains Mono", ui-monospace, Menlo, monospace; font-size: 10.5px; fill: #0F172A; }
      .small { font-size: 10px; fill: #64748B; }
      .origin { font-size: 10px; font-weight: 700; fill: #0F172A; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#DC2626"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#059669"/>
    </marker>
  </defs>

  <text x="480" y="26" class="hdr" text-anchor="middle">Facade auth chain: first admit wins, strict 401 by default</text>

  <!-- Inbound request -->
  <rect x="30" y="64" width="140" height="50" rx="6" fill="#F8FAFC" stroke="#0F172A" stroke-width="1.5"/>
  <text x="100" y="84" class="label" text-anchor="middle">inbound request</text>
  <text x="100" y="101" class="small" text-anchor="middle">WS upgrade · A2A HTTP</text>

  <!-- middleware wrapper -->
  <line x1="100" y1="114" x2="100" y2="135" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="30" y="135" width="140" height="34" rx="4" fill="#EFF6FF" stroke="#2563EB" stroke-width="1"/>
  <text x="100" y="156" class="mono" text-anchor="middle">auth.Middleware</text>

  <line x1="170" y1="152" x2="200" y2="152" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Chain box -->
  <rect x="200" y="58" width="580" height="360" rx="6" fill="#FFFFFF" stroke="#8B5CF6" stroke-width="1.5" stroke-dasharray="3,3"/>
  <text x="490" y="82" class="col-hdr" fill="#6D28D9" text-anchor="middle">auth.Chain — runs validators in order, first non-nil Identity wins</text>

  <!-- Validator 1: sharedToken -->
  <rect x="220" y="100" width="540" height="46" rx="4" fill="#ECFDF5" stroke="#059669" stroke-width="1"/>
  <text x="232" y="118" class="label" fill="#065F46">1 · sharedToken</text>
  <text x="232" y="134" class="small">crypto/subtle constant-time compare against Secret; origin = shared-token</text>
  <text x="750" y="127" class="mono" text-anchor="end">PR #952</text>

  <!-- arrow down: ErrNoCredential -->
  <line x1="490" y1="146" x2="490" y2="160" stroke="#475569" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="500" y="156" class="small">ErrNoCredential → fall through</text>

  <!-- Validator 2: apiKeys -->
  <rect x="220" y="160" width="540" height="46" rx="4" fill="#ECFDF5" stroke="#059669" stroke-width="1"/>
  <text x="232" y="178" class="label" fill="#065F46">2 · apiKeys</text>
  <text x="232" y="194" class="small">SHA-256(token) lookup in labelled Secrets; 30s refresh; origin = api-key</text>
  <text x="750" y="187" class="mono" text-anchor="end">PR #953</text>

  <line x1="490" y1="206" x2="490" y2="220" stroke="#475569" stroke-width="1" stroke-dasharray="2,2"/>

  <!-- Validator 3: OIDC -->
  <rect x="220" y="220" width="540" height="46" rx="4" fill="#ECFDF5" stroke="#059669" stroke-width="1"/>
  <text x="232" y="238" class="label" fill="#065F46">3 · OIDC</text>
  <text x="232" y="254" class="small">RS256 JWT vs. per-agent JWKS Secret; controller auto-fetches every 6h; origin = oidc</text>
  <text x="750" y="247" class="mono" text-anchor="end">#957 · #959</text>

  <line x1="490" y1="266" x2="490" y2="280" stroke="#475569" stroke-width="1" stroke-dasharray="2,2"/>

  <!-- Validator 4: edgeTrust -->
  <rect x="220" y="280" width="540" height="46" rx="4" fill="#ECFDF5" stroke="#059669" stroke-width="1"/>
  <text x="232" y="298" class="label" fill="#065F46">4 · edgeTrust</text>
  <text x="232" y="314" class="small">trust x-user-* headers emitted by verified Istio JWT; chart strips inbound copies first</text>
  <text x="750" y="307" class="mono" text-anchor="end">#954 · #968</text>

  <line x1="490" y1="326" x2="490" y2="340" stroke="#475569" stroke-width="1" stroke-dasharray="2,2"/>

  <!-- Validator 5: mgmt-plane -->
  <rect x="220" y="340" width="540" height="46" rx="4" fill="#FEF3C7" stroke="#CA8A04" stroke-width="1"/>
  <text x="232" y="358" class="label" fill="#92400E">5 · management-plane</text>
  <text x="232" y="374" class="small">dashboard-minted JWT with per-admin pseudonymous subject; origin = mgmt-plane</text>
  <text x="750" y="367" class="mono" text-anchor="end">#947 · #950 · #972</text>

  <!-- Outcome split: admit -->
  <line x1="780" y1="123" x2="820" y2="123" stroke="#059669" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="780" y1="183" x2="820" y2="183" stroke="#059669" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="780" y1="243" x2="820" y2="243" stroke="#059669" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="780" y1="303" x2="820" y2="303" stroke="#059669" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="780" y1="363" x2="820" y2="363" stroke="#059669" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- admit box -->
  <rect x="820" y="100" width="120" height="286" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="880" y="122" class="label" fill="#065F46" text-anchor="middle">admit</text>
  <text x="880" y="146" class="mono" text-anchor="middle">Identity{</text>
  <text x="880" y="162" class="small" text-anchor="middle">Subject</text>
  <text x="880" y="176" class="small" text-anchor="middle">Role</text>
  <text x="880" y="190" class="small" text-anchor="middle">EndUser</text>
  <text x="880" y="204" class="small" text-anchor="middle">Origin</text>
  <text x="880" y="218" class="small" text-anchor="middle">Claims</text>
  <text x="880" y="232" class="mono" text-anchor="middle">}</text>
  <text x="880" y="258" class="small" text-anchor="middle">→ policy.WithIdentity</text>
  <text x="880" y="274" class="small" text-anchor="middle">→ ToolPolicy CEL</text>
  <text x="880" y="290" class="small" text-anchor="middle">(PR #956)</text>
  <text x="880" y="322" class="small" text-anchor="middle" font-style="italic">same identity</text>
  <text x="880" y="336" class="small" text-anchor="middle" font-style="italic">for WS and A2A</text>
  <text x="880" y="358" class="small" text-anchor="middle">(#955 · middleware)</text>

  <!-- default flip: reject -->
  <line x1="490" y1="386" x2="490" y2="434" stroke="#DC2626" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <rect x="340" y="434" width="300" height="44" rx="4" fill="#FEF2F2" stroke="#DC2626" stroke-width="1.5"/>
  <text x="490" y="453" class="label" fill="#991B1B" text-anchor="middle">every validator returned ErrNoCredential</text>
  <text x="490" y="470" class="small" text-anchor="middle">strict default (PR #958 · #967) → 401, no pass-through</text>

  <!-- Caption -->
  <text x="480" y="502" class="caption" text-anchor="middle" font-style="italic">Non-NoCredential errors from any validator short-circuit reject — a wrong token can't accidentally admit via a later validator.</text>
</svg>
