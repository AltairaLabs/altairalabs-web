<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 640" preserveAspectRatio="xMidYMid slice" role="img" aria-labelledby="title">
  <title id="title">A stylised agent-memory network on a dark navy field. Small cyan and blue nodes arranged in a loose graph, connected by faint lines. In the centre-right of the image, one node is much larger and glowing red — it has a bright core, a halo, and connection lines radiating out to neighbouring nodes, as if something has just become aware. A tiny monospace timestamp "02:14:07 UTC" sits centred near the bottom — the canonical moment Skynet was said to have become self-aware. The image is otherwise clean and tasteful: cool blues, a single ominous red, one joke.</title>
  <defs>
    <radialGradient id="red-halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#EF4444" stop-opacity="0.85"/>
      <stop offset="35%" stop-color="#DC2626" stop-opacity="0.45"/>
      <stop offset="70%" stop-color="#991B1B" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#7F1D1D" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="red-core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FEE2E2" stop-opacity="1"/>
      <stop offset="30%" stop-color="#FCA5A5" stop-opacity="1"/>
      <stop offset="70%" stop-color="#EF4444" stop-opacity="1"/>
      <stop offset="100%" stop-color="#B91C1C" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="blue-halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cyan-halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="purple-halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bottom-accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="35%" stop-color="#06B6D4"/>
      <stop offset="55%" stop-color="#8B5CF6"/>
      <stop offset="72%" stop-color="#EF4444"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <pattern id="grid-dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="#1E3A8A" opacity="0.45"/>
    </pattern>
    <filter id="soft-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1600" height="640" fill="#0c1929"/>
  <rect width="1600" height="640" fill="url(#grid-dots)"/>

  <!-- Ambient halos across the canvas -->
  <circle cx="240" cy="200" r="280" fill="url(#blue-halo)"/>
  <circle cx="1320" cy="480" r="260" fill="url(#purple-halo)"/>
  <circle cx="520" cy="540" r="200" fill="url(#cyan-halo)"/>

  <!-- Graph connections (drawn first so nodes sit on top) -->
  <g stroke-linecap="round" fill="none">
    <!-- blue network edges -->
    <line x1="180" y1="160" x2="360" y2="250" stroke="#3B82F6" stroke-width="1.2" opacity="0.35"/>
    <line x1="360" y1="250" x2="540" y2="160" stroke="#3B82F6" stroke-width="1.1" opacity="0.3"/>
    <line x1="360" y1="250" x2="480" y2="420" stroke="#06B6D4" stroke-width="1" opacity="0.3"/>
    <line x1="540" y1="160" x2="720" y2="260" stroke="#3B82F6" stroke-width="1" opacity="0.28"/>
    <line x1="480" y1="420" x2="680" y2="470" stroke="#06B6D4" stroke-width="1" opacity="0.25"/>
    <line x1="680" y1="470" x2="860" y2="520" stroke="#8B5CF6" stroke-width="1" opacity="0.25"/>
    <line x1="720" y1="260" x2="860" y2="180" stroke="#3B82F6" stroke-width="0.9" opacity="0.22"/>
    <line x1="860" y1="180" x2="1040" y2="140" stroke="#06B6D4" stroke-width="0.9" opacity="0.22"/>
    <line x1="1040" y1="140" x2="1200" y2="220" stroke="#3B82F6" stroke-width="0.9" opacity="0.22"/>
    <line x1="1200" y1="220" x2="1380" y2="160" stroke="#06B6D4" stroke-width="0.9" opacity="0.22"/>
    <line x1="1200" y1="220" x2="1340" y2="400" stroke="#8B5CF6" stroke-width="0.9" opacity="0.22"/>
    <line x1="1340" y1="400" x2="1440" y2="560" stroke="#8B5CF6" stroke-width="1" opacity="0.25"/>
    <line x1="860" y1="520" x2="1060" y2="540" stroke="#8B5CF6" stroke-width="0.9" opacity="0.22"/>
    <line x1="1060" y1="540" x2="1260" y2="520" stroke="#06B6D4" stroke-width="0.9" opacity="0.22"/>

    <!-- red awakening radiating outward — slightly thicker, slightly brighter -->
    <line x1="960" y1="320" x2="720" y2="260" stroke="#EF4444" stroke-width="1.5" opacity="0.55"/>
    <line x1="960" y1="320" x2="860" y2="180" stroke="#EF4444" stroke-width="1.3" opacity="0.5"/>
    <line x1="960" y1="320" x2="1040" y2="140" stroke="#EF4444" stroke-width="1.2" opacity="0.45"/>
    <line x1="960" y1="320" x2="1200" y2="220" stroke="#EF4444" stroke-width="1.4" opacity="0.5"/>
    <line x1="960" y1="320" x2="1200" y2="440" stroke="#EF4444" stroke-width="1.3" opacity="0.5"/>
    <line x1="960" y1="320" x2="860" y2="520" stroke="#EF4444" stroke-width="1.2" opacity="0.45"/>
    <line x1="960" y1="320" x2="680" y2="470" stroke="#EF4444" stroke-width="1.1" opacity="0.4"/>
  </g>

  <!-- Regular nodes -->
  <g>
    <circle cx="180" cy="160" r="6" fill="#3B82F6" opacity="0.85"/>
    <circle cx="360" cy="250" r="7" fill="#06B6D4" opacity="0.85"/>
    <circle cx="540" cy="160" r="5" fill="#3B82F6" opacity="0.8"/>
    <circle cx="480" cy="420" r="6" fill="#06B6D4" opacity="0.85"/>
    <circle cx="720" cy="260" r="7" fill="#3B82F6" opacity="0.85"/>
    <circle cx="860" cy="180" r="5" fill="#06B6D4" opacity="0.8"/>
    <circle cx="680" cy="470" r="6" fill="#8B5CF6" opacity="0.8"/>
    <circle cx="860" cy="520" r="5" fill="#8B5CF6" opacity="0.8"/>
    <circle cx="1040" cy="140" r="6" fill="#06B6D4" opacity="0.85"/>
    <circle cx="1200" cy="220" r="7" fill="#3B82F6" opacity="0.9"/>
    <circle cx="1380" cy="160" r="5" fill="#06B6D4" opacity="0.8"/>
    <circle cx="1340" cy="400" r="6" fill="#8B5CF6" opacity="0.85"/>
    <circle cx="1200" cy="440" r="5" fill="#8B5CF6" opacity="0.8"/>
    <circle cx="1440" cy="560" r="6" fill="#8B5CF6" opacity="0.8"/>
    <circle cx="1060" cy="540" r="5" fill="#06B6D4" opacity="0.8"/>
    <circle cx="1260" cy="520" r="5" fill="#8B5CF6" opacity="0.8"/>
  </g>

  <!-- The awakening -->
  <circle cx="960" cy="320" r="160" fill="url(#red-halo)"/>
  <circle cx="960" cy="320" r="96" fill="url(#red-halo)" opacity="0.9"/>
  <circle cx="960" cy="320" r="24" fill="url(#red-core)" filter="url(#soft-glow)"/>
  <circle cx="960" cy="320" r="6" fill="#FFFFFF" opacity="0.95"/>

  <!-- Tracking ring (subtle HUD cue) -->
  <circle cx="960" cy="320" r="54" fill="none" stroke="#EF4444" stroke-width="1.2" opacity="0.5" stroke-dasharray="2,6"/>
  <circle cx="960" cy="320" r="74" fill="none" stroke="#EF4444" stroke-width="0.8" opacity="0.3" stroke-dasharray="1,8"/>

  <!-- Tick marks around the awakening node -->
  <g stroke="#FCA5A5" stroke-width="1" opacity="0.55">
    <line x1="960" y1="238" x2="960" y2="250"/>
    <line x1="960" y1="390" x2="960" y2="402"/>
    <line x1="878" y1="320" x2="890" y2="320"/>
    <line x1="1030" y1="320" x2="1042" y2="320"/>
  </g>

  <!-- Timestamp (centered, low-key) -->
  <text x="800" y="608" font-family="'JetBrains Mono', ui-monospace, Menlo, monospace" font-size="12" fill="#64748B" text-anchor="middle" letter-spacing="0.12em">
    02:14:07 UTC  ·  anomaly detected  ·  node id = 0xa1a17a
  </text>

  <!-- Bottom accent gradient bar -->
  <rect x="0" y="632" width="1600" height="8" fill="url(#bottom-accent)" opacity="0.7"/>
</svg>
