<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 560" font-family="Inter, system-ui, -apple-system, sans-serif" role="img" aria-labelledby="title">
  <title id="title">Resident memory at 100, 500, 1000, and 2000 concurrent streams for PromptKit, LangChain, Vercel AI SDK, and Strands Agents. PromptKit stays near 350 MB while LangChain OOMs at 2000 and Strands climbs past 4 GB.</title>
  <defs>
    <style>
      .title { font-size: 13px; font-weight: 600; }
      .mono { font-family: "JetBrains Mono", ui-monospace, Menlo, monospace; font-size: 10.5px; }
      .label { font-size: 11px; fill: #475569; }
      .axis { font-size: 10.5px; fill: #64748B; }
    </style>
  </defs>

  <!-- Heading -->
  <text x="460" y="28" font-size="15" font-weight="700" fill="#0F172A" text-anchor="middle">Resident memory by framework (tool-calling benchmark)</text>
  <text x="460" y="48" class="label" text-anchor="middle">darwin/arm64 · c6g.xlarge reference · lower is better</text>

  <!-- Chart area: x = 80..880, y = 90..440 -->
  <!-- Y axis (memory in MB; max 4608 MB = 4.5 GB) -->
  <!-- Scale: 4608 MB → pixel range 350 -->
  <line x1="110" y1="90" x2="110" y2="440" stroke="#94A3B8" stroke-width="1.5"/>
  <line x1="110" y1="440" x2="900" y2="440" stroke="#94A3B8" stroke-width="1.5"/>

  <!-- Y gridlines + labels (0, 1 GB, 2 GB, 3 GB, 4 GB) -->
  <!-- 0 MB at y=440, 4608 MB at y=90; scale = (440-90)/4608 ≈ 0.0760 px per MB -->
  <!-- 1024 MB → y = 440 - 1024*0.0760 = 361.2 -->
  <!-- 2048 MB → y = 440 - 2048*0.0760 = 284.4 -->
  <!-- 3072 MB → y = 440 - 3072*0.0760 = 206.6 -->
  <!-- 4096 MB → y = 440 - 4096*0.0760 = 128.8 -->

  <line x1="110" y1="361.2" x2="900" y2="361.2" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="110" y1="284.4" x2="900" y2="284.4" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="110" y1="206.6" x2="900" y2="206.6" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="110" y1="128.8" x2="900" y2="128.8" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="3,3"/>

  <text x="102" y="444" class="axis" text-anchor="end">0</text>
  <text x="102" y="365" class="axis" text-anchor="end">1 GB</text>
  <text x="102" y="288" class="axis" text-anchor="end">2 GB</text>
  <text x="102" y="210" class="axis" text-anchor="end">3 GB</text>
  <text x="102" y="132" class="axis" text-anchor="end">4 GB</text>

  <text x="50" y="265" class="label" transform="rotate(-90, 50, 265)" text-anchor="middle">Resident memory (MB)</text>

  <!-- X axis groups: 4 concurrent buckets, each with 4 bars -->
  <!-- Group centers: 220, 400, 580, 760. Each group width ~140. Bar width 30. Bar gap 3. -->
  <!-- Within a group, 4 bars starting at centerX - 66 -->

  <!-- Helper: bar heights
       PK: 74, 210, 348, 607 MB
       LC: 220, 688, 1331 (1.3 GB), OOM
       VAI: 370, 903, 1024, 1024
       SA: 458, 1229, 2355, 4608
       scale 0.0760
  -->

  <!-- Group 1: 100 concurrent, center x=220 -->
  <!-- PromptKit bar: MB 74 → height 5.6, y 434.4 -->
  <rect x="154" y="434.4" width="30" height="5.6" fill="#2563EB"/>
  <!-- LangChain 220 → h 16.7, y 423.3 -->
  <rect x="187" y="423.3" width="30" height="16.7" fill="#06B6D4"/>
  <!-- Vercel AI 370 → h 28.1, y 411.9 -->
  <rect x="220" y="411.9" width="30" height="28.1" fill="#8B5CF6"/>
  <!-- Strands 458 → h 34.8, y 405.2 -->
  <rect x="253" y="405.2" width="30" height="34.8" fill="#F59E0B"/>
  <text x="218" y="456" class="axis" text-anchor="middle">100</text>

  <!-- Group 2: 500 concurrent, center x=400 -->
  <!-- PK 210 → h 16, y 424 -->
  <rect x="334" y="424" width="30" height="16" fill="#2563EB"/>
  <!-- LC 688 → h 52.3, y 387.7 -->
  <rect x="367" y="387.7" width="30" height="52.3" fill="#06B6D4"/>
  <!-- VAI 903 → h 68.6, y 371.4 -->
  <rect x="400" y="371.4" width="30" height="68.6" fill="#8B5CF6"/>
  <!-- SA 1229 → h 93.4, y 346.6 -->
  <rect x="433" y="346.6" width="30" height="93.4" fill="#F59E0B"/>
  <text x="398" y="456" class="axis" text-anchor="middle">500</text>

  <!-- Group 3: 1000 concurrent, center x=580 -->
  <!-- PK 348 → h 26.4, y 413.6 -->
  <rect x="514" y="413.6" width="30" height="26.4" fill="#2563EB"/>
  <!-- LC 1331 → h 101.2, y 338.8 -->
  <rect x="547" y="338.8" width="30" height="101.2" fill="#06B6D4"/>
  <!-- VAI 1024 → h 77.8, y 362.2 -->
  <rect x="580" y="362.2" width="30" height="77.8" fill="#8B5CF6"/>
  <!-- SA 2355 → h 179, y 261 -->
  <rect x="613" y="261" width="30" height="179" fill="#F59E0B"/>
  <text x="578" y="456" class="axis" text-anchor="middle">1000</text>

  <!-- Group 4: 2000 concurrent, center x=760 -->
  <!-- PK 607 → h 46.1, y 393.9 -->
  <rect x="694" y="393.9" width="30" height="46.1" fill="#2563EB"/>
  <!-- LC OOM — red X marker -->
  <rect x="727" y="420" width="30" height="20" fill="none" stroke="#DC2626" stroke-width="2"/>
  <line x1="727" y1="420" x2="757" y2="440" stroke="#DC2626" stroke-width="2"/>
  <line x1="757" y1="420" x2="727" y2="440" stroke="#DC2626" stroke-width="2"/>
  <text x="742" y="414" class="mono" fill="#DC2626" text-anchor="middle">OOM</text>
  <!-- VAI 1024 → y 362.2 -->
  <rect x="760" y="362.2" width="30" height="77.8" fill="#8B5CF6"/>
  <!-- SA 4608 → h 350, y 90 -->
  <rect x="793" y="90" width="30" height="350" fill="#F59E0B"/>
  <text x="758" y="456" class="axis" text-anchor="middle">2000</text>

  <!-- X label -->
  <text x="490" y="478" class="label" text-anchor="middle">Concurrent streams</text>

  <!-- Legend -->
  <g transform="translate(110, 500)">
    <rect x="0" y="0" width="16" height="16" fill="#2563EB"/>
    <text x="22" y="13" class="label">PromptKit</text>

    <rect x="120" y="0" width="16" height="16" fill="#06B6D4"/>
    <text x="142" y="13" class="label">LangChain</text>

    <rect x="240" y="0" width="16" height="16" fill="#8B5CF6"/>
    <text x="262" y="13" class="label">Vercel AI SDK</text>

    <rect x="380" y="0" width="16" height="16" fill="#F59E0B"/>
    <text x="402" y="13" class="label">Strands Agents</text>
  </g>

  <!-- Callout -->
  <text x="694" y="80" class="mono" fill="#2563EB">PromptKit: ~350 MB at 2000 concurrent</text>
</svg>
