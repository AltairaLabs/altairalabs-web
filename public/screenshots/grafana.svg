  <rect x="440" y="186" width="8" height="8" rx="2" fill="#3B82F6"/>
  <text x="454" y="194" fill="#94A3B8" font-family="sans-serif" font-size="10">Claude</text>
  <rect x="500" y="186" width="8" height="8" rx="2" fill="#8B5CF6"/>
  <text x="514" y="194" fill="#94A3B8" font-family="sans-serif" font-size="10">GPT-4o</text>
  <rect x="562" y="186" width="8" height="8" rx="2" fill="#06B6D4"/>
  <text x="576" y="194" fill="#94A3B8" font-family="sans-serif" font-size="10">Gemini</text>

  <!-- Row 2: Token usage panel -->
