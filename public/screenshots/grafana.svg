  <text x="666" y="248" fill="#94A3B8" font-family="sans-serif" font-size="10">sales-qualifier</text>
  <rect x="770" y="238" width="96" height="14" rx="3" fill="#8B5CF6"/>
  <text x="872" y="249" fill="#64748B" font-family="sans-serif" font-size="9">824K</text>

  <text x="666" y="274" fill="#94A3B8" font-family="sans-serif" font-size="10">onboarding-guide</text>
  <rect x="770" y="264" width="52" height="14" rx="3" fill="#06B6D4"/>
  <text x="828" y="275" fill="#64748B" font-family="sans-serif" font-size="9">360K</text>

  <text x="666" y="300" fill="#94A3B8" font-family="sans-serif" font-size="10">internal-helpdesk</text>
  <rect x="770" y="290" width="20" height="14" rx="3" fill="#F59E0B"/>
  <text x="796" y="301" fill="#64748B" font-family="sans-serif" font-size="9">48K</text>

