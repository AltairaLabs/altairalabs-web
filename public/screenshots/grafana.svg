  <rect x="402" y="414" width="120" height="14" rx="2" fill="#3B82F6"/>
  <rect x="524" y="414" width="36" height="14" rx="2" fill="#06B6D4"/>
  <text x="570" y="424" fill="#64748B" font-family="sans-serif" font-size="9">tool:crm.lookup → llm:claude → tool:zendesk.reply</text>
  <!-- Trace 2 -->
  <text x="32" y="450" fill="#3B82F6" font-family="monospace" font-size="11">7b2e9f4a1c83</text>
  <text x="180" y="450" fill="#E2E8F0" font-family="sans-serif" font-size="11">0.87s</text>
  <text x="280" y="450" fill="#E2E8F0" font-family="sans-serif" font-size="11">4</text>
  <rect x="360" y="440" width="200" height="14" rx="2" fill="#1a2332"/>
  <rect x="360" y="440" width="140" height="14" rx="2" fill="#3B82F6"/>
  <rect x="502" y="440" width="30" height="14" rx="2" fill="#10B981"/>
