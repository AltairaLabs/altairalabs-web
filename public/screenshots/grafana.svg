  <text x="360" y="400" fill="#475569" font-family="sans-serif" font-size="10" font-weight="600">WATERFALL</text>
  <!-- Trace 1 -->
  <text x="32" y="424" fill="#3B82F6" font-family="monospace" font-size="11">a3f8c2d1e5b7</text>
  <text x="180" y="424" fill="#E2E8F0" font-family="sans-serif" font-size="11">1.24s</text>
  <text x="280" y="424" fill="#E2E8F0" font-family="sans-serif" font-size="11">7</text>
