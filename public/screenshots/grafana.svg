<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" fill="none">
  <!-- Window chrome -->
  <rect width="960" height="540" rx="12" fill="#111217"/>
  <rect width="960" height="36" rx="12" fill="#1a1a2e"/>
  <rect y="24" width="960" height="12" fill="#1a1a2e"/>
  <circle cx="20" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="18" r="6" fill="#febc2e"/>
  <circle cx="60" cy="18" r="6" fill="#28c840"/>
  <text x="480" y="22" text-anchor="middle" fill="#64748B" font-family="monospace" font-size="11">Grafana — Omnia Agent Observability</text>

  <!-- Top bar -->
  <rect x="0" y="36" width="960" height="32" fill="#181b1f"/>
  <text x="16" y="56" fill="#F59E0B" font-family="sans-serif" font-size="12" font-weight="600">Omnia / Agent Performance</text>
  <text x="880" y="56" fill="#64748B" font-family="sans-serif" font-size="11">Last 6 hours</text>

  <!-- Row 1: 3 stat panels -->
  <rect x="16" y="80" width="300" height="80" rx="6" fill="#1E293B"/>
  <text x="32" y="102" fill="#64748B" font-family="sans-serif" font-size="11">Request Rate</text>
  <text x="32" y="140" fill="#10B981" font-family="sans-serif" font-size="32" font-weight="700">342</text>
  <text x="120" y="140" fill="#64748B" font-family="sans-serif" font-size="14">req/s</text>

  <rect x="330" y="80" width="300" height="80" rx="6" fill="#1E293B"/>
  <text x="346" y="102" fill="#64748B" font-family="sans-serif" font-size="11">P99 Latency</text>
  <text x="346" y="140" fill="#3B82F6" font-family="sans-serif" font-size="32" font-weight="700">289</text>
  <text x="425" y="140" fill="#64748B" font-family="sans-serif" font-size="14">ms</text>

  <rect x="644" y="80" width="300" height="80" rx="6" fill="#1E293B"/>
  <text x="660" y="102" fill="#64748B" font-family="sans-serif" font-size="11">Error Rate</text>
  <text x="660" y="140" fill="#10B981" font-family="sans-serif" font-size="32" font-weight="700">0.02</text>
  <text x="752" y="140" fill="#64748B" font-family="sans-serif" font-size="14">%</text>

  <!-- Row 2: Latency chart -->
  <rect x="16" y="172" width="620" height="170" rx="6" fill="#1E293B"/>
  <text x="32" y="194" fill="#E2E8F0" font-family="sans-serif" font-size="12" font-weight="600">LLM Call Latency by Provider</text>
  <!-- Y axis labels -->
  <text x="32" y="220" fill="#475569" font-family="sans-serif" font-size="9">400ms</text>
  <text x="32" y="260" fill="#475569" font-family="sans-serif" font-size="9">200ms</text>
  <text x="32" y="300" fill="#475569" font-family="sans-serif" font-size="9">100ms</text>
  <text x="32" y="330" fill="#475569" font-family="sans-serif" font-size="9">0</text>
  <!-- Grid lines -->
  <line x1="70" y1="216" x2="620" y2="216" stroke="#2D3748" stroke-width="0.5"/>
  <line x1="70" y1="256" x2="620" y2="256" stroke="#2D3748" stroke-width="0.5"/>
  <line x1="70" y1="296" x2="620" y2="296" stroke="#2D3748" stroke-width="0.5"/>
  <!-- Claude line -->
  <polyline points="70,260 120,255 170,250 220,262 270,248 320,242 370,250 420,238 470,245 520,235 570,230 610,228" stroke="#3B82F6" stroke-width="2" fill="none"/>
