  <!-- Trace 3 -->
  <text x="32" y="476" fill="#3B82F6" font-family="monospace" font-size="11">d1c5e8f3a9b2</text>
  <text x="180" y="476" fill="#F59E0B" font-family="sans-serif" font-size="11">3.41s</text>
  <text x="280" y="476" fill="#E2E8F0" font-family="sans-serif" font-size="11">12</text>
  <rect x="360" y="466" width="200" height="14" rx="2" fill="#1a2332"/>
  <rect x="360" y="466" width="20" height="14" rx="2" fill="#3B82F6" opacity="0.5"/>
  <rect x="382" y="466" width="80" height="14" rx="2" fill="#3B82F6"/>
  <rect x="464" y="466" width="30" height="14" rx="2" fill="#F59E0B"/>
  <rect x="496" y="466" width="64" height="14" rx="2" fill="#8B5CF6"/>
  <text x="570" y="476" fill="#64748B" font-family="sans-serif" font-size="9">llm:claude → tool:escalate → llm:gpt4o → tool:handoff</text>
  <!-- Trace 4 -->
  <text x="32" y="502" fill="#3B82F6" font-family="monospace" font-size="11">e4a7b1c6d2f8</text>
  <text x="180" y="502" fill="#E2E8F0" font-family="sans-serif" font-size="11">0.62s</text>
  <text x="280" y="502" fill="#E2E8F0" font-family="sans-serif" font-size="11">3</text>
  <rect x="360" y="492" width="200" height="14" rx="2" fill="#1a2332"/>
  <rect x="360" y="492" width="100" height="14" rx="2" fill="#3B82F6"/>
  <rect x="462" y="492" width="24" height="14" rx="2" fill="#10B981"/>
  <text x="570" y="502" fill="#64748B" font-family="sans-serif" font-size="9">llm:claude → tool:kb.search</text>
</svg>
