<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 500" fill="none">
  <!-- Window chrome -->
  <rect width="960" height="500" rx="12" fill="#0F172A"/>
  <rect width="960" height="36" rx="12" fill="#1a1a2e"/>
