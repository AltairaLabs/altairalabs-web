  <line x1="32" y1="404" x2="928" y2="404" stroke="#1E293B" stroke-width="1"/>
  <text x="48" y="428" fill="#F8FAFC" font-family="sans-serif" font-size="13">Multi-language</text>
  <text x="280" y="428" fill="#E2E8F0" font-family="sans-serif" font-size="12">40</text>
  <text x="380" y="428" fill="#10B981" font-family="sans-serif" font-size="12" font-weight="600">91.5%</text>
  <text x="500" y="428" fill="#E2E8F0" font-family="sans-serif" font-size="12">88.2%</text>
  <text x="620" y="428" fill="#10B981" font-family="sans-serif" font-size="12">+3.3%</text>
  <rect x="720" y="416" width="48" height="20" rx="10" fill="rgba(16,185,129,0.15)"/>
  <text x="728" y="430" fill="#10B981" font-family="sans-serif" font-size="10" font-weight="600">Pass</text>

  <!-- Footer note -->
  <text x="32" y="472" fill="#475569" font-family="sans-serif" font-size="11">Quality gate threshold: 75% per category · Safety: PII redaction, hallucination check, escalation compliance</text>
</svg>
