  <text x="280" y="344" fill="#E2E8F0" font-family="sans-serif" font-size="12">55</text>
  <text x="380" y="344" fill="#F8FAFC" font-family="sans-serif" font-size="12" font-weight="600">82.4%</text>
  <text x="500" y="344" fill="#E2E8F0" font-family="sans-serif" font-size="12">80.1%</text>
  <text x="620" y="344" fill="#10B981" font-family="sans-serif" font-size="12">+2.3%</text>
  <rect x="720" y="332" width="48" height="20" rx="10" fill="rgba(16,185,129,0.15)"/>
  <text x="728" y="346" fill="#10B981" font-family="sans-serif" font-size="10" font-weight="600">Pass</text>

