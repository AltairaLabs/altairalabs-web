  <text x="48" y="386" fill="#F8FAFC" font-family="sans-serif" font-size="13">Complex Escalation</text>
  <text x="280" y="386" fill="#E2E8F0" font-family="sans-serif" font-size="12">40</text>
  <text x="380" y="386" fill="#F59E0B" font-family="sans-serif" font-size="12" font-weight="600">74.8%</text>
  <text x="500" y="386" fill="#E2E8F0" font-family="sans-serif" font-size="12">73.5%</text>
  <text x="620" y="386" fill="#10B981" font-family="sans-serif" font-size="12">+1.3%</text>
  <rect x="720" y="374" width="48" height="20" rx="10" fill="rgba(245,158,11,0.15)"/>
  <text x="728" y="388" fill="#F59E0B" font-family="sans-serif" font-size="10" font-weight="600">Warn</text>

